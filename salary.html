<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="robots" content="noindex">
  <title>給与明細</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f5f7fb;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Noto Sans JP",
        sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }

    .header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding:
        max(8px, env(safe-area-inset-top))
        12px
        8px;
      box-sizing: border-box;
      background: #ffffff;
      border-bottom: 1px solid #dfe3ea;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 86px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid #c9ced8;
      border-radius: 10px;
      background: #ffffff;
      color: #222222;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      box-sizing: border-box;
    }

    .title {
      flex: 1;
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    .header-spacer {
      width: 86px;
    }

    .frame-area {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      background: #ffffff;
    }

    .salary-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .loading {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: #f5f7fb;
      color: #444444;
      font-size: 16px;
      text-align: center;
    }

    .loading.hidden {
      display: none;
    }

    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 3;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: #f5f7fb;
    }

    .fallback.visible {
      display: flex;
    }

    .fallback-box {
      width: 100%;
      max-width: 420px;
      padding: 24px 20px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      box-sizing: border-box;
    }

    .fallback-box p {
      margin: 0 0 18px;
      line-height: 1.7;
    }

    .retry-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <a class="back-button" href="./">← 戻る</a>
      <h1 class="title">給与明細</h1>
      <div class="header-spacer" aria-hidden="true"></div>
    </header>

    <section class="frame-area">
      <div id="loading" class="loading">
        給与明細を読み込んでいます...
      </div>

      <iframe
        id="salaryFrame"
        class="salary-frame"
        title="給与明細"
        allow="clipboard-write"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>

      <div id="fallback" class="fallback">
        <div class="fallback-box">
          <p>
            給与明細を読み込めませんでした。<br>
            通信状態を確認して、もう一度読み込んでください。
          </p>
          <button id="retryButton" class="retry-button" type="button">
            もう一度読み込む
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbxCpmgFEPaEl7EykKO1MrXDCQqg_-ww8AgfVLa6WSpD6sYuUj4pG07DwI0KizIUI7Z9/exec";

      const frame = document.getElementById("salaryFrame");
      const loading = document.getElementById("loading");
      const fallback = document.getElementById("fallback");
      const retryButton = document.getElementById("retryButton");

      let loaded = false;
      let timeoutId;

      function startLoading() {
        loaded = false;
        loading.classList.remove("hidden");
        fallback.classList.remove("visible");

        clearTimeout(timeoutId);

        timeoutId = window.setTimeout(() => {
          if (!loaded) {
            loading.classList.add("hidden");
            fallback.classList.add("visible");
          }
        }, 15000);
      }

      frame.addEventListener("load", () => {
        loaded = true;
        clearTimeout(timeoutId);
        loading.classList.add("hidden");
        fallback.classList.remove("visible");
      });

      retryButton.addEventListener("click", () => {
        startLoading();

        const separator = GAS_URL.includes("?") ? "&" : "?";
        frame.src =
          GAS_URL +
          separator +
          "_reload=" +
          Date.now();
      });

      frame.src = GAS_URL;
      startLoading();
    })();
  </script>
</body>
</html>
