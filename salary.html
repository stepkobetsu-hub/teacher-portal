<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給与明細を開いています</title>
  <meta name="robots" content="noindex">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fb;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.7;
      margin: 0 0 18px;
    }
    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>給与明細を開いています</h1>
    <p>自動で画面が切り替わらない場合は、下のボタンを押してください。</p>
    <a id="openLink" href="#">給与明細を開く</a>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxCpmgFEPaEl7EykKO1MrXDCQqg_-ww8AgfVLa6WSpD6sYuUj4pG07DwI0KizIUI7Z9/exec";

    document.getElementById("openLink").href = GAS_URL;

    setTimeout(() => {
      window.location.replace(GAS_URL);
    }, 300);
  </script>
</body>
</html>
