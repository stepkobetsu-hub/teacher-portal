<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP配信システム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>STEP配信システム</h1>
        <p>個別送信・添付・テンプレート管理・履歴確認</p>
      </div>
      <button id="reloadButton" class="small-button">再読込</button>
    </header>

    <main class="layout">
      <section class="card main-card">
        <div class="section">
          <label class="label">テンプレート</label>
          <select id="templateSelect" class="input"></select>
          <div class="template-actions">
            <button id="newTemplateButton" type="button" class="small-button">自由文から作成</button>
            <button id="saveTemplateButton" type="button" class="small-button">現在の件名・本文をテンプレート保存</button>
            <button id="reloadTemplateButton" type="button" class="small-button">テンプレート再読込</button>
          </div>
          <p class="hint">定型文は「テンプレート」シートに保存されます。件名・本文を直して保存できます。</p>
        </div>

        <div class="grid-2">
          <div class="section">
            <label class="label">日付</label>
            <input type="date" id="dateInput" class="input" />
            <div id="dateDisplay" class="date-display">日付未選択</div>
          </div>
          <div class="section">
            <label class="label">時間帯</label>
            <select id="timeSelect" class="input">
              <option value="17:10～18:25">17:10～18:25</option>
              <option value="18:35～19:50">18:35～19:50</option>
              <option value="20:00～21:15">20:00～21:15</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <div id="customTimeArea" class="section hidden">
          <label class="label">その他の時間帯</label>
          <input type="text" id="customTimeInput" class="input" placeholder="例：19:00～20:00" />
        </div>

        <section class="student-box">
          <div class="student-head">
            <h2>送信対象生徒</h2>
            <div class="student-actions">
              <button id="selectVisibleButton" class="small-button">表示中を選択</button>
              <button id="clearSelectedButton" class="small-button danger-light">選択解除</button>
            </div>
          </div>

          <div class="grid-2">
            <div class="section compact">
              <label class="label">校舎</label>
              <select id="schoolFilter" class="input">
                <option value="全校舎">全校舎</option>
                <option value="神領校">神領校</option>
                <option value="大手町校">大手町校</option>
              </select>
            </div>
            <div class="section compact">
              <label class="label">学年</label>
              <select id="gradeFilter" class="input">
                <option value="全学年">全学年</option>
                <option value="小1">小1</option>
                <option value="小2">小2</option>
                <option value="小3">小3</option>
                <option value="小4">小4</option>
                <option value="小5">小5</option>
                <option value="小6">小6</option>
                <option value="中1">中1</option>
                <option value="中2">中2</option>
                <option value="中3">中3</option>
                <option value="高1">高1</option>
                <option value="高2">高2</option>
                <option value="高3">高3</option>
              </select>
            </div>
          </div>

          <div class="section compact">
            <label class="label">氏名検索</label>
            <input type="text" id="nameSearch" class="input" placeholder="例：山田、やまだ、太郎" />
          </div>

          <div class="selected-panel">
            <div class="selected-panel-head">
              <strong>現在選択中の生徒（送信後は自動で消えます）</strong>
              <span id="selectedPanelCount">0人</span>
            </div>
            <div id="selectedStudentList" class="selected-student-list">まだ選択されていません。</div>
          </div>

          <div class="student-status">
            <span id="studentCountText">読み込み中...</span>
            <strong id="selectedCountText">選択 0人</strong>
          </div>
          <div id="studentList" class="student-list"></div>
        </section>

        <div class="section">
          <label class="label">件名</label>
          <input type="text" id="subjectInput" class="input" />
        </div>

        <div class="section">
          <label class="label">本文</label>
          <textarea id="bodyInput" class="textarea"></textarea>
        </div>

        <div class="section">
          <label class="label">実物添付（PDF・写真など）</label>
          <div id="dropZone" class="drop-zone">
            <strong>ここへドラッグ＆ドロップ</strong><br />
            または <label class="file-label">ファイルを選択<input type="file" id="fileInput" multiple /></label>
          </div>
          <div id="attachmentList" class="attachment-list">添付ファイルはありません。</div>
          <p class="hint">PDF・写真などをメールに実物添付します。大きすぎるファイルは送信に失敗する場合があります。</p>
        </div>

        <div class="section">
          <label class="label">リンク</label>
          <textarea id="linkInput" class="textarea small" placeholder="GoogleドライブURL、WebページURLなど。複数ある場合は1行ずつ入力してください。"></textarea>
        </div>

        <div class="section">
          <label class="label">プレビュー</label>
          <div id="preview" class="preview"></div>
        </div>

        <button id="sendButton" class="send-button">選択した生徒に配信する</button>
        <p id="statusMessage" class="status"></p>
      </section>

      <aside class="card history-card">
        <div class="history-head">
          <h2>最近の配信履歴</h2>
          <button id="historyReloadButton" class="small-button">更新</button>
        </div>
        <div class="section compact">
          <label class="label">履歴検索</label>
          <input type="text" id="historySearch" class="input" placeholder="生徒名・件名で検索" />
          <div class="history-date-range">
            <div>
              <label class="label mini">送信日From</label>
              <input type="date" id="historyFromDate" class="input" />
            </div>
            <div>
              <label class="label mini">送信日To</label>
              <input type="date" id="historyToDate" class="input" />
            </div>
          </div>
          <button id="historyClearButton" class="small-button full">履歴条件クリア</button>
        </div>
        <div id="historyList" class="history-list">読み込み中...</div>
      </aside>
    </main>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
