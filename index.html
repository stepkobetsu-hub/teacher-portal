<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>個別指導STEP 講師ポータル</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="images/app-icon.png"><link rel="icon" href="images/favicon.png"><meta name="theme-color" content="#2563eb"><script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script></head><body><main class="app">
<section id="homePage" class="page home-page"><div class="topHero"><span class="sun"></span><span class="stripe"></span><span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span><div class="heroInner"><img src="images/app-icon.png" class="heroIcon" alt=""><div><div class="heroStep">STEP</div><div class="heroTitle">講師ポータル</div></div></div><div class="heroWave"></div></div><div class="mainArea"><div id="greetingText" class="greeting">今日も一緒にがんばりましょう！</div><div class="datePill"><span>📅</span><strong id="homeDate">----</strong></div><div class="menuList"><button class="menuBtn green" onclick="showAttendance()"><span class="menuIcon">📋</span><span><strong>出勤確認</strong><small>授業後の出勤確認</small></span><b>›</b></button><button class="menuBtn blue" onclick="showNyutaikun()"><span class="menuIcon">▦</span><span><strong>入退くんQR</strong><small>入退くんのQRを表示</small></span><b>›</b></button><button class="menuBtn yellow" onclick="openSummerSchedule()"><span class="menuIcon">🌻</span><span><strong>夏休み出勤可能日登録</strong><small>夏期講習の出勤可能日を登録</small></span><b>›</b></button><button class="menuBtn purple" onclick="showUnderConstruction()"><span class="menuIcon">💰</span><span><strong>給与明細</strong><small>🚧 工事中</small></span><b>›</b></button></div><div class="staffLinkArea"><a class="staffLinkBtn" href="https://stepkobetsu-hub.github.io/seiseki-kanri/">🔐 スタッフ用アプリ</a></div></div></section>
<section id="loginPage" class="page hidden"><div class="card"><button class="back" onclick="backHome()">← トップへ</button><h2>出勤確認ログイン</h2><p class="lead">講師コードを入力してください。</p><label>講師コード</label><input id="code" type="text" inputmode="numeric" placeholder="例：7085"><button onclick="login()">ログイン</button><div id="loginMsg" class="noticeMsg hidden"></div></div></section>
<section id="formPage" class="page hidden"><div class="card"><button class="back" onclick="backHome()">← トップへ</button><button class="logoutAttendanceBtn" onclick="logoutAttendance()">ログアウト</button><div id="teacherTitle" class="teacherTitle"><div class="teacherCode" id="teacherCodeDisplay">----</div><div class="teacherName" id="teacherNameDisplay">----</div></div><label>出勤日</label><div class="dateBox"><div id="dateText" class="dateText"></div></div><button type="button" class="dateChangeBtn" onclick="openDatePicker()">日付を変更する</button><input id="workDate" class="dateInputHidden" type="date" onchange="updateDateText()"><label>本日の担当授業</label><div class="checks"><label><input type="checkbox" value="13:00～14:15">13:00～14:15</label><label><input type="checkbox" value="14:20～15:35">14:20～15:35</label><label><input type="checkbox" value="15:45～17:00">15:45～17:00</label><label><input type="checkbox" value="17:10～18:25">17:10～18:25</label><label><input type="checkbox" value="18:35～19:50">18:35～19:50</label><label><input type="checkbox" value="20:00～21:15">20:00～21:15</label></div><label>本日の担当コマ数</label><select id="koma" onchange="toggleOther()"><option value="">選択してください</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="その他">その他</option></select><div id="otherBox" class="hidden"><label>その他のコマ数</label><input id="komaOther" type="text" placeholder="例：1.5"></div><label>勤務場所</label><select id="place"><option value="">選択してください</option><option value="神領校">神領校</option><option value="大手町校">大手町校</option><option value="その他">その他</option></select><label>その他・備考</label><textarea id="memo" placeholder="必要な場合のみ入力"></textarea><button id="submitBtn" onclick="submitForm()">送信する</button><div id="sending" class="sending hidden">📩 送信しています...</div></div></section>
<section id="completePage" class="page hidden"><div class="card doneBox"><button class="back" onclick="backHome()">← トップへ</button><div class="doneTitle">送信完了しました</div><div id="completeMessage" class="doneSub"></div><div id="randomMessage" class="randomMessage"></div><div class="nyutaikunReminder"><div class="nyuTitle">入退くんも忘れずにね</div><div class="nyuCute"><div class="tablet"><div class="tabletFace">😊</div><div class="tabletQr"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div></div><div class="tabletBase"></div><div class="phone">📱</div><div class="sparkleA">✨</div><div class="sparkleB">🌟</div></div><div class="nyuText">入口のタブレットでQRを読み取ってください</div></div><button onclick="backToForm()">続けて入力する</button><button class="secondary" onclick="backHome()">トップページへ戻る</button></div></section>
<section id="nyutaikunLoginPage" class="page hidden"><div class="card"><button class="back" onclick="backHome()">← トップへ</button><h2>入退くんQR</h2><p class="lead">講師コードを入力してください。次回から記憶されます。</p><label>講師コード</label><input id="nyuCode" type="text" inputmode="numeric" placeholder="例：7085"><button onclick="loadNyutaikunQr()">QRコードを表示</button><div id="nyuMsg" class="noticeMsg hidden"></div></div></section>
<section id="nyutaikunQrPage" class="page hidden"><div class="qrOnlyPage"><div class="qrTopBar"><button class="back" onclick="backHome()">← トップへ</button><button class="logoutMini" onclick="logoutNyutaikun()">ログアウト</button></div><div class="qrTeacherInfo"><div><span>講師コード</span><strong id="nyuCodeDisplay">----</strong></div><div><span>氏名</span><strong id="nyuNameDisplay">----</strong></div></div><div id="qrDisplay" class="qr-display largeQr"></div><p class="qrGuide">このQRコードを入口のAndroidタブレットにかざしてください。</p><button onclick="backHome()">トップページへ戻る</button></div></section>
<section id="adminQrPage" class="page hidden"><div class="card"><button class="back" onclick="backHome()">← トップへ</button><h2>管理者：QR登録</h2><p class="lead">紙の入退くんQRを読み取り、講師マスターQ列に保存します。</p><label>講師コード</label><input id="adminCode" type="text" inputmode="numeric" placeholder="例：7085"><div class="scannerBox"><video id="qrVideo" playsinline></video><canvas id="qrCanvas" class="hidden"></canvas></div><button onclick="startQrScan()">カメラでQRを読む</button><button class="secondary" onclick="stopQrScan()">カメラ停止</button><label>読み取ったQRデータ</label><textarea id="adminQrData" placeholder="QRデータ"></textarea><button onclick="saveAdminQrData()">このQRデータをQ列へ保存</button><div id="adminMsg" class="noticeMsg hidden"></div></div></section>
</main><div id="toast" class="toast hidden"><div class="toastCard"><div id="toastIcon" class="toastIcon">✅</div><div id="toastTitle" class="toastTitle">完了</div><div id="toastText" class="toastText"></div><button onclick="hideToast()">OK</button></div></div><script src="script.js"></script></body></html>
