<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>個別指導STEP 講師ポータル</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/app-icon.png">
  <link rel="icon" href="images/favicon.png">
  <meta name="theme-color" content="#2563eb">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
  <main class="app">
    <section id="homePage" class="page home-page">
      <section class="selected-hero">
        <img src="images/logo.jpg" class="selected-logo" alt="個別指導STEP">
        <span class="selected-sun"></span>
        <span class="sparkle sp1"></span><span class="sparkle sp2"></span><span class="sparkle sp3"></span>
        <div class="selected-title">
          <h1>講師ポータル</h1>
          <p id="greetingText">おはようございます！</p>
        </div>
      </section>

      <div class="selected-date">
        <span>📅</span>
        <strong id="homeDate">----</strong>
      </div>

      <div class="selected-grid">
        <button class="selected-tile green" onclick="showAttendance()">
          <span class="tile-icon">📝</span>
          <span><strong>出勤確認</strong><small>授業後の<br>出勤報告はこちら</small></span>
          <b>›</b>
        </button>

        <button class="selected-tile blue" onclick="showNyutaikun()">
          <span class="tile-icon">📱</span>
          <span><strong>入退くんQR</strong><small>来た時・帰る時に<br>タブレットへ</small></span>
          <b>›</b>
        </button>

        <button class="selected-tile summer full" onclick="openSummerSchedule()">
          <span class="tile-icon">🌻</span>
          <span><strong>夏休み出勤可能日登録</strong><small>夏期講習の出勤できる日を登録します</small></span>
          <b>›</b>
        </button>

        <button class="selected-tile purple disabled">
          <span class="tile-icon">💰</span>
          <span><strong>給与明細</strong><small>給与明細を<br>確認できます</small></span>
          <b>›</b>
        </button>

        <button class="selected-tile orange" onclick="showAdminQr()">
          <span class="tile-icon">⚙️</span>
          <span><strong>管理者QR登録</strong><small>講師QRを<br>登録します</small></span>
          <b>›</b>
        </button>
      </div>

      <div class="selected-notice">
        <span>🔔</span>
        <div><b>お知らせ</b><p>授業後は「出勤確認」と「入退くん」を忘れずにお願いします。</p></div>
      </div>

      <div class="selected-town">
        <span class="cloud c1"></span><span class="cloud c2"></span>
        <span class="house h1"></span><span class="house h2"></span><span class="house h3"></span><span class="house h4"></span><span class="house h5"></span>
        <span class="tree t1"></span><span class="tree t2"></span><span class="tree t3"></span>
      </div>
      <div class="selected-footer">© 個別指導STEP / Teacher Portal</div>
    </section>

    <section id="loginPage" class="page hidden">
      <div class="card">
        <button class="back" onclick="backHome()">← トップへ</button>
        <h2>講師ログイン</h2>
        <p class="lead">講師コードを入力してください。</p>
        <label>講師コード</label>
        <input id="code" type="text" inputmode="numeric" placeholder="例：7085">
        <button onclick="login()">ログイン</button>
        <div id="loginMsg" class="notice hidden"></div>
      </div>
    </section>

    <section id="formPage" class="page hidden">
      <div class="card">
        <div id="hello" class="hello"></div>
        <div id="headerName" class="headerName"></div>

        <label>出勤日</label>
        <div class="dateBox">
          <div id="dateText" class="dateText"></div>
          <input id="workDate" type="date" onchange="updateDateText()">
        </div>

        <label>本日の担当授業</label>
        <div class="checks">
          <label><input type="checkbox" value="13:00～14:15">13:00～14:15</label>
          <label><input type="checkbox" value="14:20～15:35">14:20～15:35</label>
          <label><input type="checkbox" value="15:45～17:00">15:45～17:00</label>
          <label><input type="checkbox" value="17:10～18:25">17:10～18:25</label>
          <label><input type="checkbox" value="18:35～19:50">18:35～19:50</label>
          <label><input type="checkbox" value="20:00～21:15">20:00～21:15</label>
        </div>

        <label>本日の担当コマ数</label>
        <select id="koma" onchange="toggleOther()">
          <option value="">選択してください</option>
          <option value="1">1</option><option value="2">2</option><option value="3">3</option>
          <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          <option value="その他">その他</option>
        </select>

        <div id="otherBox" class="hidden">
          <label>その他のコマ数</label>
          <input id="komaOther" type="text" placeholder="例：1.5">
        </div>

        <label>勤務場所</label>
        <select id="place">
          <option value="">選択してください</option>
          <option value="神領校">神領校</option>
          <option value="大手町校">大手町校</option>
          <option value="その他">その他</option>
        </select>

        <label>その他・備考</label>
        <textarea id="memo" placeholder="必要な場合のみ入力"></textarea>

        <button id="submitBtn" onclick="submitForm()">送信する</button>
        <div id="sending" class="sending hidden">📩 送信しています...</div>
      </div>
    </section>

    <section id="completePage" class="page hidden">
      <div class="card doneBox">
        <div class="doneTitle">送信完了しました</div>
        <div id="completeMessage" class="doneSub"></div>
        <div id="randomMessage" class="randomMessage"></div>
        <div class="nyutaikun-reminder">入退くんも忘れずにお願いします！</div>
        <button onclick="backToForm()">続けて入力する</button>
        <button class="secondary" onclick="backHome()">トップページへ戻る</button>
      </div>
    </section>

    <section id="nyutaikunLoginPage" class="page hidden">
      <div class="card">
        <button class="back" onclick="backHome()">← トップへ</button>
        <h2>入退くんQR</h2>
        <p class="lead">講師コードを入力してください。次回から記憶されます。</p>
        <label>講師コード</label>
        <input id="nyuCode" type="text" inputmode="numeric" placeholder="例：7085">
        <button onclick="loadNyutaikunQr()">QRコードを表示</button>
        <div id="nyuMsg" class="notice hidden"></div>
      </div>
    </section>

    <section id="nyutaikunQrPage" class="page hidden">
      <div class="card qr-card">
        <button class="back" onclick="backHome()">← トップへ</button>
        <h2 id="nyuName">入退くんQR</h2>
        <p class="lead">入口のAndroidタブレットにかざしてください。</p>
        <div id="qrDisplay" class="qr-display"></div>
        <div id="qrRaw" class="qr-raw"></div>
        <button onclick="backHome()">トップページへ戻る</button>
        <button class="secondary" onclick="logoutNyutaikun()">ログアウト・コードを消す</button>
      </div>
    </section>

    <section id="adminQrPage" class="page hidden">
      <div class="card">
        <button class="back" onclick="backHome()">← トップへ</button>
        <h2>管理者：QR登録</h2>
        <p class="lead">紙の入退くんQRを読み取り、講師マスターQ列に保存します。</p>

        <label>講師コード</label>
        <input id="adminCode" type="text" inputmode="numeric" placeholder="例：7085">

        <div class="scanner-box">
          <video id="qrVideo" playsinline></video>
          <canvas id="qrCanvas" class="hidden"></canvas>
        </div>

        <button id="startScanBtn" onclick="startQrScan()">カメラでQRを読む</button>
        <button class="secondary" onclick="stopQrScan()">カメラ停止</button>

        <label>読み取ったQRデータ</label>
        <textarea id="adminQrData" placeholder="カメラで読めない場合は、QRリーダー等で読んだ文字列をここへ貼り付けてもOKです。"></textarea>

        <button onclick="saveAdminQrData()">このQRデータをQ列へ保存</button>
        <div id="adminMsg" class="notice hidden"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden">
    <div class="toast-card">
      <div id="toastIcon" class="toast-icon">✅</div>
      <div id="toastTitle" class="toast-title">完了</div>
      <div id="toastText" class="toast-text"></div>
      <button onclick="hideToast()">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
