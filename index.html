<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個別指導STEP 講師ポータル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-bg"></div>

  <main class="wrap">
    <section id="homePage" class="card home-card">
      <img src="images/logo.jpg" alt="個別指導STEP" class="logo">
      <div class="portal-title">講師ポータル</div>
      <div class="portal-sub">個別指導STEP</div>

      <button class="menu-btn active" onclick="showAttendance()">
        <span class="menu-icon">📝</span>
        <span>
          <strong>出勤確認</strong>
          <small>授業後の出勤報告はこちら</small>
        </span>
      </button>

      <button class="menu-btn disabled" type="button">
        <span class="menu-icon">📷</span>
        <span>
          <strong>入退くん</strong>
          <small>忘れずに読み取りをお願いします</small>
        </span>
      </button>

      <button class="menu-btn disabled" type="button">
        <span class="menu-icon">💰</span>
        <span>
          <strong>給与明細</strong>
          <small>準備中</small>
        </span>
      </button>
    </section>

    <section id="loginPage" class="card hidden">
      <img src="images/logo.jpg" alt="個別指導STEP" class="logo small-logo">
      <h1>講師出勤確認</h1>
      <div class="school">個別指導ステップ</div>

      <label for="code">講師コード</label>
      <input id="code" type="text" inputmode="numeric" autocomplete="off" placeholder="例：7085">
      <button onclick="login()">ログイン</button>
      <button class="sub-btn" onclick="backHome()" type="button">ポータルへ戻る</button>
      <div id="loginMsg" class="notice hidden"></div>
    </section>

    <section id="formPage" class="card hidden">
      <div id="hello" class="hello"></div>
      <div id="headerName" class="headerName"></div>

      <label>出勤日</label>
      <div class="dateBox">
        <div id="dateText" class="dateText"></div>
        <input id="workDate" type="date" onchange="updateDateText()">
      </div>

      <label>本日の担当授業</label>
      <div class="checks">
        <label><input type="checkbox" value="13:00～14:15"><span>13:00～14:15</span></label>
        <label><input type="checkbox" value="14:20～15:35"><span>14:20～15:35</span></label>
        <label><input type="checkbox" value="15:45～17:00"><span>15:45～17:00</span></label>
        <label><input type="checkbox" value="17:10～18:25"><span>17:10～18:25</span></label>
        <label><input type="checkbox" value="18:35～19:50"><span>18:35～19:50</span></label>
        <label><input type="checkbox" value="20:00～21:15"><span>20:00～21:15</span></label>
      </div>

      <label for="koma">本日の担当コマ数</label>
      <select id="koma" onchange="toggleOther()">
        <option value="">選択してください</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="その他">その他</option>
      </select>

      <div id="otherBox" class="hidden">
        <label for="komaOther">その他のコマ数</label>
        <input id="komaOther" type="text" inputmode="decimal" placeholder="例：1.5">
      </div>

      <label for="place">勤務場所</label>
      <select id="place">
        <option value="">選択してください</option>
        <option value="神領校">神領校</option>
        <option value="大手町校">大手町校</option>
        <option value="その他">その他</option>
      </select>

      <label for="memo">その他・備考</label>
      <textarea id="memo" placeholder="必要な場合のみ入力"></textarea>

      <button id="submitBtn" onclick="submitForm()">送信する</button>
      <div id="sending" class="sending hidden">📩 送信しています...</div>
    </section>

    <section id="completePage" class="card hidden">
      <div class="doneBox">
        <div class="doneMark">✓</div>
        <div class="doneTitle">送信完了しました</div>
        <div id="completeMessage" class="doneSub"></div>
        <div id="randomMessage" class="randomMessage"></div>
        <img class="doneImg" src="images/nyutaikun.png" alt="入退くんも忘れずにね">
        <button onclick="backToForm()">続けて入力する</button>
        <button class="sub-btn" onclick="backHome()" type="button">ポータルへ戻る</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
