<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個別指導STEP 講師ポータル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">

    <section id="homePage" class="page">
      <div class="homeCard">
        <img src="images/logo.jpg" alt="個別指導STEP" class="logo compactLogo">
        <h1>講師ポータル</h1>
        <p class="subTitle">個別指導STEP</p>

        <button class="menuCard primary" onclick="showAttendance()">
          <span class="icon">📝</span>
          <span>
            <strong>出勤確認</strong>
            <small>授業後の出勤報告はこちら</small>
          </span>
        </button>

        <button class="menuCard" onclick="showNyutaikun()">
          <span class="icon">▦</span>
          <span>
            <strong>入退くん</strong>
            <small>自分のQRコードを表示</small>
          </span>
        </button>

        <button class="menuCard disabled" type="button">
          <span class="icon">💰</span>
          <span>
            <strong>給与明細</strong>
            <small>準備中</small>
          </span>
        </button>
      </div>
    </section>

    <section id="loginPage" class="page hidden">
      <div class="card">
        <button class="backBtn" onclick="backHome()">← トップへ戻る</button>
        <h2>出勤確認ログイン</h2>
        <p class="subTitle">講師コードを入力してください</p>
        <label>講師コード</label>
        <input id="code" type="text" inputmode="numeric" placeholder="例：7085">
        <button onclick="login()">ログイン</button>
        <div id="loginMsg" class="notice hidden"></div>
      </div>
    </section>

    <section id="formPage" class="page hidden">
      <div class="card">
        <div id="hello" class="hello"></div>
        <div id="headerName" class="headerName"></div>

        <label>出勤日</label>
        <div class="dateBox">
          <div id="dateText" class="dateText"></div>
          <input id="workDate" type="date" onchange="updateDateText()">
        </div>

        <label>本日の担当授業</label>
        <div class="checks">
          <label><input type="checkbox" value="13:00～14:15">13:00～14:15</label>
          <label><input type="checkbox" value="14:20～15:35">14:20～15:35</label>
          <label><input type="checkbox" value="15:45～17:00">15:45～17:00</label>
          <label><input type="checkbox" value="17:10～18:25">17:10～18:25</label>
          <label><input type="checkbox" value="18:35～19:50">18:35～19:50</label>
          <label><input type="checkbox" value="20:00～21:15">20:00～21:15</label>
        </div>

        <label>本日の担当コマ数</label>
        <select id="koma" onchange="toggleOther()">
          <option value="">選択してください</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="その他">その他</option>
        </select>

        <div id="otherBox" class="hidden">
          <label>その他のコマ数</label>
          <input id="komaOther" type="text" placeholder="例：1.5">
        </div>

        <label>勤務場所</label>
        <select id="place">
          <option value="">選択してください</option>
          <option value="神領校">神領校</option>
          <option value="大手町校">大手町校</option>
          <option value="その他">その他</option>
        </select>

        <label>その他・備考</label>
        <textarea id="memo" placeholder="必要な場合のみ入力"></textarea>

        <button id="submitBtn" onclick="submitForm()">送信する</button>
        <div id="sending" class="sending hidden">📩 送信しています...</div>
      </div>
    </section>

    <section id="completePage" class="page hidden">
      <div class="card doneBox">
        <div class="doneTitle">送信完了しました</div>
        <div id="completeMessage" class="doneSub"></div>
        <div id="randomMessage" class="randomMessage"></div>
        <button onclick="backToForm()">続けて入力する</button>
        <button class="secondary" onclick="backHome()">トップへ戻る</button>
      </div>
    </section>

    <section id="nyutaikunPage" class="page hidden">
      <div class="card qrCard">
        <button class="backBtn" onclick="backHome()">← トップへ戻る</button>
        <h2>入退くん QRコード</h2>
        <p class="subTitle">教室入口のタブレットに読み取らせてください</p>

        <div id="nyutaikunLogin">
          <label>講師コード</label>
          <input id="qrCodeInput" type="text" inputmode="numeric" placeholder="例：7085">
          <button onclick="showMyQr()">QRコードを表示</button>
          <div id="qrMsg" class="notice hidden"></div>
        </div>

        <div id="qrDisplay" class="hidden">
          <div class="qrTeacher" id="qrTeacherName"></div>
          <img id="qrImage" class="qrImage" alt="入退くん QRコード">
          <div class="qrHint">来たとき・帰るときに、このQRコードを読み取ってください。</div>
          <button onclick="backHome()">トップページへ戻る</button>
          <button class="secondary danger" onclick="logoutQr()">ログアウト・コードを消す</button>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
